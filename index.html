<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#12131a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Clash Arena</title>
<link rel="manifest" href="manifest.json">
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
  }
</script>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{--pr:#3d9be9;--bg:#12131a;--panel:#1e2030;--p2:#252840;--ac:#f5c518;--tx:#e8eaf0;--dn:#e8415a;--ok:#2ebd6b;--pu:#9b5de5;--top:calc(60px + env(safe-area-inset-top));--nav:calc(75px + env(safe-area-inset-bottom));--br:rgba(255,255,255,0.08)}
*{box-sizing:border-box;user-select:none;margin:0;padding:0;font-family:'Exo 2',sans-serif;-webkit-tap-highlight-color:transparent}

html,body{width:100vw!important;height:100dvh!important;max-width:100vw;max-height:100dvh;background:var(--bg);color:var(--tx);overflow:hidden!important;position:fixed!important;top:0;left:0;right:0;bottom:0;-webkit-text-size-adjust:100%}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes emotePop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.2);opacity:1}100%{transform:scale(1);opacity:1}}
@keyframes slideBannerE{0%{right:-320px}15%{right:0}85%{right:0}100%{right:-320px}}
@keyframes slideBannerP{0%{left:-320px}15%{left:0}85%{left:0}100%{left:-320px}}
@keyframes flashRed{0%,100%{border-color:rgba(255,255,255,.12);background:rgba(42,45,69,1)}40%,70%{border-color:#e8415a;background:rgba(232,65,90,.2)}}
@keyframes mmPulse{0%,100%{opacity:.3;transform:scale(.6)}50%{opacity:1;transform:scale(1)}}
@keyframes foilSweep{0%{left:-150%}30%{left:150%}100%{left:150%}}
@keyframes worldPulse{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
@keyframes worldGlow{0%,100%{box-shadow:0 0 12px rgba(245,197,24,0.5)}50%{box-shadow:0 0 24px rgba(245,197,24,0.9),0 0 40px rgba(245,197,24,0.3)}}
@keyframes pathAnim{0%{stroke-dashoffset:100}100%{stroke-dashoffset:0}}
@keyframes starTwink{0%,100%{opacity:.2}50%{opacity:1}}

#app-cover{position:fixed;inset:0;background:var(--bg);z-index:19000;transition:opacity .4s ease;pointer-events:none}
#toast-c{position:fixed;top:calc(70px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;width:88%;max-width:350px}
.toast{background:rgba(232,65,90,.95);color:#fff;padding:13px 18px;border-radius:12px;font-size:14px;font-weight:700;animation:slideUp .3s forwards;text-align:center;pointer-events:auto}
.toast.ok{background:rgba(46,189,107,.95)}.toast.inf{background:rgba(61,155,233,.95)}
#intro{position:fixed;inset:0;background:#000;z-index:20000;display:flex;flex-direction:column;justify-content:center;align-items:center;pointer-events:none}
#intro h1{font-family:'Orbitron',sans-serif;color:#fff;font-size:36px;font-weight:900;letter-spacing:3px;text-align:center}
#intro p{color:rgba(255,255,255,.3);font-size:13px;letter-spacing:5px;margin-top:10px;text-transform:uppercase}
#loading{position:fixed;inset:0;background:radial-gradient(ellipse at top,#182540,#0a0d14);z-index:25000;display:none;flex-direction:column;justify-content:flex-end;align-items:center;padding-bottom:90px}
#loading h1{position:absolute;top:22%;font-family:'Orbitron',sans-serif;font-size:46px;font-weight:900;color:#fff;text-align:center;line-height:1.1}
#loading h1 span{color:var(--ac)}
.lbar{width:260px;height:8px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden}
#lprog{height:100%;background:linear-gradient(90deg,var(--pr),var(--ac));width:0%;transition:width .2s;border-radius:4px}
#ltxt{color:rgba(255,255,255,.4);font-size:12px;margin-top:14px;letter-spacing:2px}
.topbar{position:fixed;top:0;left:0;width:100%;height:var(--top);padding-top:env(safe-area-inset-top);background:rgba(18,19,26,.96);display:flex;justify-content:space-between;align-items:center;padding-left:14px;padding-right:14px;z-index:2000;border-bottom:1px solid var(--br);backdrop-filter:blur(8px)}
.tstat{display:flex;align-items:center;gap:5px;font-size:15px;font-weight:700;background:var(--panel);padding:7px 12px;border-radius:20px;border:1px solid var(--br)}

/* ИСПРАВЛЕНИЕ: Увеличены кнопки в лобби, убрана лишняя пустота */
nav{position:fixed;bottom:0;left:0;width:100%;height:var(--nav);background:rgba(18,19,26,.97);display:flex;justify-content:space-around;align-items:center;z-index:2000;border-top:1px solid var(--br);backdrop-filter:blur(8px);padding-bottom:env(safe-area-inset-bottom,0)}
.nb{padding:6px 4px;font-size:11px;text-align:center;cursor:pointer;opacity:.4;transition:.2s;text-transform:uppercase;color:var(--tx);font-weight:700;flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;letter-spacing:.3px}
.nb.active{opacity:1;color:var(--pr)}.ni{font-size:26px;transition:.2s}

.scr{display:block;width:100%;position:absolute!important;top:var(--top)!important;bottom:var(--nav)!important;left:0;right:0;height:auto!important;background:var(--bg);overflow-y:auto!important;overflow-x:hidden!important;-webkit-overflow-scrolling:touch;padding-top:10px;padding-bottom:25px;transition:transform .28s cubic-bezier(.4,0,.2,1),opacity .28s ease;opacity:0;transform:translateX(100%);pointer-events:none;z-index:1}
.scr.active{transform:translateX(0);opacity:1;pointer-events:auto;z-index:2}
.scr.past{transform:translateX(-100%);opacity:0;pointer-events:none}

#s-main{display:flex!important;flex-direction:column;justify-content:flex-start;gap:15px;align-items:center;padding:15px 0 25px!important;overflow-y:auto!important;overflow-x:hidden!important}
.grid{display:grid;grid-template-columns:repeat(3, 1fr);gap:10px;padding:13px;width:100%;max-width:500px;margin:0 auto}
.ci{background:linear-gradient(155deg,#2a2d45,#1e2030);border-radius:14px;border:1.5px solid var(--br);text-align:center;position:relative;padding:8px 6px;display:flex;flex-direction:column;align-items:center;justify-content:space-between;width:100%;height:auto;aspect-ratio:1/1.3;cursor:pointer;transition:.2s}
@media (min-width: 450px) { .cicon { font-size: 38px; } }
.cpb{width:100%;height:8px;background:rgba(0,0,0,.4);border-radius:4px;overflow:hidden;margin-top:auto;margin-bottom:3px;position:relative;z-index:2}
.cpbf{height:100%;background:linear-gradient(90deg,var(--ok),#5ef09a);border-radius:4px;transition:width .3s}
.cpt{font-size:10px;color:rgba(255,255,255,.4);margin-top:3px;position:relative;z-index:2}
.ci.locked{filter:grayscale(1) brightness(.4);aspect-ratio:1/1;justify-content:center;pointer-events:none}
.ci.sel{border-color:var(--ac)!important;box-shadow:0 0 10px rgba(245,197,24,0.5)!important}
.ci.fav-sel{border-color:#ff6b9d!important;box-shadow:0 0 12px rgba(255,107,157,0.6)!important}

.cicon{font-size:46px;margin-bottom:4px;position:relative;z-index:2}
.cname{font-size:14px;font-weight:700;color:#fff;width:100%;line-height:1.2;text-align:center;position:relative;z-index:2}
.clvl{position:absolute;top:-8px;right:-8px;background:var(--bg);color:var(--ac);border:1.5px solid var(--ac);border-radius:8px;padding:3px 6px;font-size:11px;font-weight:900;font-family:'Orbitron',sans-serif;z-index:10}

.bigbtn{width:88vw;max-width:340px;height:9vh;min-height:64px;max-height:80px;background:linear-gradient(145deg,#f5c518,#d4810a);border:none;border-radius:15px;color:#1a1000;font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;cursor:pointer;box-shadow:0 5px 0 rgba(0,0,0,.4);transition:.1s;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:10px}
.bigbtn:active{transform:translateY(5px);box-shadow:0 0 0}
.bigbtn.sd{background:linear-gradient(145deg,#e8415a,#9d1828);color:#fff;font-size:14px;height:7.5vh;min-height:54px;margin-top:8px;box-shadow:0 5px 0 rgba(0,0,0,.4)}

#bscr{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#000;z-index:6000;flex-direction:column;overflow:hidden;opacity:0;transition:opacity .3s ease;touch-action:none;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
#bscr.active{display:flex;opacity:1}
#cvs-c{flex:1;width:100%;position:relative;overflow:hidden;margin-top:env(safe-area-inset-top)}
canvas{display:block;width:100%;height:100%;touch-action:none}

/* ИСПРАВЛЕНИЕ: Убрана черная линия (border-top), бесшовный фон */
.bui{flex:0 0 auto;width:100%;min-height:170px;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 10px calc(10px + env(safe-area-inset-bottom));position:relative;z-index:10;box-sizing:border-box}
.hand{display:flex;flex-direction:row;gap:8px;justify-content:center;align-items:center;width:100%;overflow:visible;}

/* ИСПРАВЛЕНИЕ: Карты увеличены */
.gc{width:23vw;max-width:90px;height:auto;aspect-ratio:1/1.4;flex-shrink:0;background:linear-gradient(155deg,#2a2d45,#1a1d30);border-radius:13px;border:1.5px solid rgba(255,255,255,.12);position:relative;display:flex;flex-direction:column;justify-content:center;align-items:center;padding-bottom:4px;box-sizing:border-box;cursor:grab;touch-action:none;transition:border-color .15s,opacity .15s,background .15s}
.gc.can{border-color:rgba(61,155,233,.6);background:linear-gradient(155deg,#2e3550,#1e2540)}
.gc.cant{opacity:.45;border-color:rgba(232,65,90,.28)}
.gc.flash{animation:flashRed .3s ease 3}
.gc-icon{font-size:9vw;margin-bottom:4px;pointer-events:none;position:relative;z-index:2}
@media (min-width: 450px) { .gc-icon { font-size: 42px; } }
.gc-name{color:rgba(255,255,255,.8);font-size:11px;font-weight:700;text-align:center;line-height:1.15;width:94%;pointer-events:none;position:relative;z-index:2}

.ecost{position:absolute;top:-8px;left:-8px;background:var(--pu);width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;border:1.5px solid rgba(255,255,255,.22);z-index:10;color:#fff;font-family:'Orbitron',sans-serif;pointer-events:none}
.elwrap{width:85%;max-width:400px;display:flex;align-items:center;gap:5px;margin-bottom:12px;flex-shrink:0}
.elsegs{flex:1;display:flex;gap:3px;height:15px}
.elseg{flex:1;border-radius:4px;background:rgba(255,255,255,.07);transition:background .12s}
.elseg.on{background:#9b5de5}.elseg.half{background:rgba(155,93,229,.4)}
.elcnt{font-family:'Orbitron',sans-serif;font-size:15px;font-weight:900;color:#c084fc;min-width:24px;text-align:right}

#arenabox{width:92%;max-width:440px;aspect-ratio:16/9;max-height:25vh;position:relative;border-radius:18px;border:1.5px solid rgba(255,255,255,.1);overflow:hidden;margin:0 auto;flex-shrink:1;cursor:pointer;}
.arenaoverlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.07),rgba(0,0,0,.62));z-index:1}
.arenacont{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;justify-content:center;align-items:center}
.arenatit{font-family:'Orbitron',sans-serif;color:#fff;font-size:28px;font-weight:900;text-shadow:0 2px 10px rgba(0,0,0,.8);text-align:center;margin:0}
.arenadesc{color:rgba(255,255,255,.8);font-size:14px;font-weight:700;margin-top:6px;margin-bottom:0}
.sec{background:rgba(0,0,0,.22);border-radius:15px;padding:11px;margin:11px 15px;border:1px solid var(--br)}
.stit{text-align:center;color:rgba(255,255,255,.38);font-size:11px;margin-bottom:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px}
.cslot{width:46px;height:46px;background:rgba(0,0,0,.3);border-radius:12px;border:1.5px dashed rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:22px;color:rgba(255,255,255,.18);transition:.3s}
.cslot.filled{border-style:solid;border-color:var(--ac);background:rgba(245,197,24,.1)}
.mfbtn{flex:1;padding:11px 6px;background:var(--panel);border:1px solid var(--br);border-radius:13px;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;font-size:13px;font-weight:700;transition:.15s;text-align:center}
.mfbtn:active{transform:scale(.97)}
.dtabs{display:flex;border-bottom:1px solid var(--br)}
.dtab{flex:1;font-size:13px;font-weight:800;color:rgba(255,255,255,.4);cursor:pointer;transition:.2s;padding:14px 0;text-align:center;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid transparent}
.dtab.active{color:#fff;border-bottom-color:var(--pr)}

.rr-c{border:1.5px solid rgba(255,255,255,0.15)!important}
.rr-r{border:1.5px solid #3d9be9!important;box-shadow:inset 0 0 12px rgba(61,155,233,0.15)}
.rr-e{border:1.5px solid #9b5de5!important;box-shadow:inset 0 0 12px rgba(155,93,229,0.15)}
.rr-l{border:1.5px solid #f5c518!important;box-shadow:inset 0 0 15px rgba(245,197,24,0.25)}
.foil{border-color:#f5c518!important;overflow:hidden!important;box-shadow:0 0 15px rgba(245,197,24,0.5)!important}
.foil-fx{position:absolute;top:-50%;bottom:-50%;width:150%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.6),transparent);transform:rotate(25deg);animation:foilSweep 3s infinite ease-in-out;pointer-events:none;z-index:5}

.ov{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.88);z-index:4500;flex-direction:column;justify-content:center;align-items:center;backdrop-filter:blur(4px)}
.mbox{width:92%;max-width:420px;background:var(--panel);border-radius:20px;border:1px solid var(--br);overflow:hidden;display:flex;flex-direction:column;max-height:88vh;animation:popIn .3s ease forwards;box-shadow:0 20px 60px rgba(0,0,0,.7)}
.pbtn{width:100%;padding:12px;border-radius:12px;border:none;background:var(--pr);color:#fff;font-size:13px;font-weight:700;cursor:pointer;margin-top:8px;transition:.15s;text-transform:uppercase;letter-spacing:.5px}
.pbtn:active{transform:scale(.96)}.pbtn:disabled{background:#2a2d45;color:rgba(255,255,255,.2);cursor:not-allowed}
.pbtn.ok{background:var(--ok)!important}.pbtn.dn{background:var(--dn)!important}
.ainput{width:100%;padding:14px;margin-bottom:13px;border-radius:12px;border:1.5px solid var(--br);background:rgba(0,0,0,.4);color:#fff;font-size:15px;outline:none;font-family:'Exo 2',sans-serif}
.ainput:focus{border-color:var(--pr)}

.srow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--br)}
.srow:last-child{border-bottom:none}.slbl{color:rgba(255,255,255,.5);font-size:13px}
.sval{font-weight:800;font-size:15px;font-family:'Orbitron',sans-serif}
.lbi{display:flex;align-items:center;background:var(--p2);padding:12px 14px;margin-bottom:7px;border-radius:13px;border:1px solid var(--br);animation:fadeIn .3s ease}
.lbr{font-family:'Orbitron',sans-serif;font-size:15px;font-weight:900;width:30px;flex-shrink:0}
.lbr.gold{color:var(--ac)}.lbr.silver{color:#aaa}.lbr.bronze{color:#c87d4a}

.mslot, .eslot { width: 50px; height: 50px; background: rgba(0,0,0,.3); border-radius: 12px; border: 1.5px dashed rgba(255,255,255,.18); display: flex; align-items: center; justify-content: center; font-size: 24px; color: rgba(255,255,255,.18); cursor: pointer; transition: .3s; }
.mslot.filled, .eslot.filled { border-style: solid; border-color: var(--ac); background: rgba(245,197,24,.1); color: #fff; }
.mitem { font-size: 28px; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; opacity: 0.3; filter: grayscale(1); cursor: default; }
.mitem.unl { opacity: 1; filter: grayscale(0); cursor: pointer; transition: .2s; }
.mitem.eq { box-shadow: 0 0 10px rgba(245,197,24,.5); border-radius: 12px; background: rgba(245,197,24,.15); }

.fbox { width: 92%; max-width: 420px; background: var(--panel); border-radius: 20px; border: 1px solid var(--br); overflow: hidden; display: flex; flex-direction: column; max-height: 80vh; animation: popIn .3s ease forwards; }
.ftab { flex: 1; padding: 12px 0; text-align: center; font-size: 13px; font-weight: 800; color: rgba(255,255,255,.4); cursor: pointer; border-bottom: 2px solid transparent; transition: .2s; }
.ftab.active { color: #fff; border-bottom-color: var(--pr); }
.finput { width: 100%; padding: 12px; border-radius: 12px; border: 1.5px solid var(--br); background: rgba(0,0,0,.4); color: #fff; font-size: 14px; outline: none; margin-bottom: 10px; font-family:'Exo 2',sans-serif; }
.finput:focus { border-color: var(--pr); }
.fbtn { width: 100%; padding: 12px; border-radius: 12px; border: none; background: var(--pr); color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; transition: .15s; margin-top: 5px;}
.fbtn:active { transform: scale(.97); }

.pass-path { display: flex; flex-direction: column; padding: 20px; gap: 15px; position: relative; }
.pass-node { display: flex; align-items: center; background: var(--p2); border: 1px solid var(--br); border-radius: 15px; padding: 10px; position: relative; z-index: 2; overflow: hidden;}
.pass-lvl { width: 40px; height: 40px; background: rgba(0,0,0,.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron', sans-serif; font-weight: 900; color: var(--ac); border: 2px solid var(--br); flex-shrink: 0; position: relative; z-index: 2;}
.pass-reward { flex: 1; margin-left: 15px; display: flex; justify-content: space-between; align-items: center; position: relative; z-index: 2;}
.pass-line { position: absolute; left: 40px; top: 0; bottom: 0; width: 2px; background: var(--br); z-index: 1; }

#pass-wrap{position:absolute;top:0;bottom:0;left:0;right:0;width:100%;height:100%;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;z-index:1}
#pass-controls{position:absolute;top:8px;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:0 13px;z-index:200;pointer-events:none}
#pass-controls>*{pointer-events:auto}
#qpanel{position:absolute;bottom:-2px;left:0;right:0;background:var(--panel);border-top:1px solid var(--br);z-index:3000;max-height:65vh;overflow-y:auto;transform:translateY(105%);transition:transform .3s cubic-bezier(.4,0,.2,1);border-radius:18px 18px 0 0;box-shadow:0 -10px 30px rgba(0,0,0,.6)}
#qpanel.open{transform:translateY(0)}

#s-world{padding:0!important;overflow:hidden!important}
#world-container{position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 30% 20%,#0a1525 0%,#060c18 50%,#020508 100%);overflow:hidden}
#world-svg{width:100%;height:100%;position:absolute;top:0;left:0}
#world-tooltip{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);background:rgba(8,14,28,.92);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:14px 22px;text-align:center;pointer-events:none;min-width:200px;max-width:85%;backdrop-filter:blur(10px);box-shadow:0 4px 20px rgba(0,0,0,.7);transition:opacity .2s}
.friend-card{display:flex;align-items:center;background:var(--p2);padding:12px 14px;border-radius:13px;margin-bottom:10px;border:1px solid var(--br);gap:12px}
.friend-card .fc-info{flex:1;min-width:0}
.friend-card .fc-name{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.friend-card .fc-sub{font-size:11px;color:rgba(255,255,255,.35);margin-top:2px}
.fc-btn{border:none;border-radius:9px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;transition:.15s}
.fc-btn.green{background:var(--ok);color:#fff}.fc-btn.red{background:var(--dn);color:#fff}.fc-btn.blue{background:var(--pr);color:#fff}
.chestbox{font-size:120px;display:flex;align-items:center;justify-content:center;cursor:pointer;animation:pulse 1.5s infinite}
.chestrev{display:none;flex-direction:column;align-items:center;animation:popIn .4s cubic-bezier(.175,.885,.32,1.275)}
.xpwrap{width:100%;height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;margin-top:4px}
.xpfill{height:100%;background:linear-gradient(90deg,var(--pr),var(--pu));border-radius:3px;transition:width .5s ease}

#btimer{position:absolute;top:calc(12px + env(safe-area-inset-top));left:12px;z-index:2600;background:rgba(0,0,0,.65);border-radius:10px;padding:6px 14px;color:#fff;font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;pointer-events:none;backdrop-filter:blur(4px)}
#bscore{position:absolute;top:calc(12px + env(safe-area-inset-top));right:12px;z-index:2600;background:rgba(0,0,0,.65);border-radius:10px;padding:6px 14px;color:#fff;font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;pointer-events:none;backdrop-filter:blur(4px);display:flex;gap:5px;align-items:center}
#emote-btn{position:absolute;bottom:calc(180px + env(safe-area-inset-bottom));left:12px;width:40px;height:40px;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.2);border-radius:50%;font-size:18px;display:flex;justify-content:center;align-items:center;z-index:2600;cursor:pointer;pointer-events:auto}
#emote-panel{display:none;position:absolute;bottom:calc(230px + env(safe-area-inset-bottom));left:12px;background:rgba(0,0,0,.82);border:1px solid rgba(255,255,255,.14);border-radius:15px;padding:9px;flex-direction:column;gap:7px;z-index:2600;animation:popIn .2s ease;pointer-events:auto}
.ebubble{position:absolute;background:rgba(255,255,255,.94);border-radius:15px;padding:6px 12px;font-size:26px;z-index:2500;display:none;box-shadow:0 4px 10px rgba(0,0,0,.4)}
#dghost{position:fixed;pointer-events:none;z-index:9000;width:22vw;max-width:80px;aspect-ratio:1/1.4;background:linear-gradient(155deg,#2a2d45,#1a1d30);border-radius:13px;border:2px solid var(--pr);display:none;flex-direction:column;align-items:center;justify-content:center;opacity:.88;transform:translate(-50%,-50%)}
#bend{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.96);z-index:9999;flex-direction:column;justify-content:center;align-items:center;opacity:0;transition:opacity .5s}
#bend.active{display:flex;opacity:1}
.ebanner{display:flex;align-items:center;width:92%;max-width:420px;margin:6px 0;background:var(--panel);border:1px solid var(--br);border-radius:15px;overflow:hidden;height:58px;animation:popIn .5s ease}
.ebc{width:16px;height:100%}.ebi{flex:1;padding:0 14px;display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:14px}
.etro{font-size:18px;font-weight:900;font-family:'Orbitron',sans-serif}.etro.win{color:var(--ok)}.etro.lose{color:var(--dn)}.etro.tie{color:var(--ac)}
.bban{position:absolute;width:260px;height:58px;display:flex;align-items:center;font-size:14px;font-weight:800;color:#fff;text-shadow:1px 1px 3px rgba(0,0,0,.8);z-index:2600;text-transform:uppercase;padding:0 18px;pointer-events:none;font-family:'Exo 2',sans-serif}
.bban-e{top:calc(55px + env(safe-area-inset-top));right:-320px;clip-path:polygon(0 0,100% 0,100% 100%,0 100%,14% 50%);justify-content:flex-end}
.bban-p{bottom:calc(170px + env(safe-area-inset-bottom));left:-320px;clip-path:polygon(0 0,100% 0,86% 50%,100% 100%,0 100%);justify-content:flex-start}
.bban-e.anim{animation:slideBannerE 3s forwards}
.bban-p.anim{animation:slideBannerP 3s forwards}
.creator-badge{background:#e8415a;color:#fff;border-radius:4px;padding:1px 4px;font-size:10px;font-weight:900;margin-left:4px;box-shadow:0 0 5px #e8415a;display:inline-block;vertical-align:middle;line-height:1}

.rl-machine{width:120px;height:120px;border-radius:20px;border:3px solid var(--ac);background:var(--p2);overflow:hidden;position:relative;margin:0 auto}
.rl-machine::before,.rl-machine::after{content:'';position:absolute;left:0;right:0;height:35px;z-index:5;pointer-events:none}
.rl-machine::before{top:0;background:linear-gradient(to bottom,var(--p2),transparent)}
.rl-machine::after{bottom:0;background:linear-gradient(to top,var(--p2),transparent)}
.rl-arrow{position:absolute;right:-18px;top:50%;transform:translateY(-50%);font-size:22px;z-index:6;filter:drop-shadow(0 0 6px var(--ac))}
.rl-track{display:flex;flex-direction:column;align-items:center;will-change:transform}
.rl-item{width:120px;height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;font-size:42px}
.rl-item span { display: block; font-size: 12px; font-weight: 700; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,.8); margin-top: 5px; }
</style>
